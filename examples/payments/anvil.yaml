# Supplemental Anvil manifest (spec §4). Enriches semantics the OpenAPI spec
# cannot express: idempotency contracts, confirmation policy, and approvals.
service:
  name: payments
  display_name: Payments API
  owner: payments-platform
  environment: prod

auth:
  type: oauth2
  scopes:
    - payments.read
    - payments.write

operations:
  # Refunds are irreversible financial mutations. Make them idempotent via an
  # Idempotency-Key header so retries are safe, and require confirmation.
  createRefund:
    side_effect: mutation
    risk: financial
    reversible: false
    idempotency:
      strategy: required_request_key
      key_location: header
      header: Idempotency-Key
    confirmation:
      required: true
      risk: financial
      reason: This operation creates an irreversible financial mutation.
    retries:
      enabled: true
      only_on:
        - timeout
        - "429"
        - "503"
      max_attempts: 3
    state: approved

  # Capture is a financial mutation but idempotent by payment id.
  capturePayment:
    side_effect: mutation
    risk: financial
    idempotency:
      strategy: natural
    confirmation:
      required: true
      risk: financial
    state: approved

  getCustomer:
    state: approved
  getPayment:
    state: approved

# Workflows are first-class and authored (never guessed). This one belongs to
# the refunds capability: look up the payment, then issue an idempotent refund.
workflows:
  refund_customer:
    display_name: Refund a customer
    description: Find the payment, confirm it is refundable, then issue an idempotent refund.
    capability: refunds
    intent_examples:
      - refund a customer
      - give money back for a payment
    human_approval: true
    rollback: Refunds are irreversible; there is no automated rollback once issued.
    steps:
      - operation: getPayment
        description: Look up the payment and verify it is refundable.
      - operation: createRefund
        description: Issue the refund with an idempotency key.
        bindings:
          payment_id: $.steps.getPayment.id
