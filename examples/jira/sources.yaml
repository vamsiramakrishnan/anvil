# Enrichment sources — published MCP servers Anvil connects to as a client
# (see reference/workflow.md and packages/harness/src/profiles.ts). Naming
# `system: jira` selects the built-in profile: spawn `npx -y mcp-atlassian`
# with JIRA_URL/JIRA_API_TOKEN from the environment, and query its
# jira_search tool for implementation-grade evidence per operation.
#
# Requires real credentials to do anything: JIRA_URL, JIRA_API_TOKEN. Without
# them `anvil enrich` still runs, but connects to zero sources and proposes
# nothing — see docs/backtesting/deficiencies.md for what that looks like and
# why the manifest in this directory was hand-authored from documented Jira
# semantics instead.
sources:
  - id: jira
    system: jira
    hints:
      scope: ["project:curated-backtest"]
