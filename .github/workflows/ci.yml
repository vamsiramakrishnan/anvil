name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Build BEFORE test: the cookbook-snippet tests execute the docs' literal
      # `node packages/cli/dist/bin-anvil.js ...` commands (that's the point —
      # the snippets users copy must actually run), so the built CLI must exist.
      # Everything else resolves workspace packages from source via vitest.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Gateway-estate differential: import every estate in estates.tsv end-to-end
      # through `anvil estate import` (built above) and gate on policy accounting
      # against estates-baseline.json — a dropped opaque policy or a shifted
      # approval posture fails here. Offline and deterministic, so it's a per-PR
      # gate, not a nightly one.
      - name: Estates (gateway differential, gates)
        run: node tools/corpus/run.mjs estates
