# Supplemental Anvil manifest (spec §4) for the Intercom API backtest.
# Generated against the real compiled AIR: reads and already-'generated'
# mutations are approved as the compiler classified them; non-idempotent
# creates are declared idempotency:none (no client dedupe key exists) and
# confirmation-required. See docs/backtesting/batch2.md.
service:
  name: intercom
  display_name: Intercom API
  owner: backtesting
  environment: prod
auth:
  type: oauth2
  scopes: []
operations:
  ShowContact: { state: approved }
  UpdateContact: { state: approved }
  SearchContacts: { state: approved }
  ListContacts: { state: approved }
  CreateContact:
    idempotency: { strategy: none }
    confirmation: { required: true, risk: medium, reason: "Non-idempotent create; retrying after a failure may duplicate it." }
    retries: { enabled: false }
    state: approved
  listConversations: { state: approved }
  createConversation:
    idempotency: { strategy: none }
    confirmation: { required: true, risk: medium, reason: "Non-idempotent create; retrying after a failure may duplicate it." }
    retries: { enabled: false }
    state: approved
  retrieveConversation: { state: approved }
  replyConversation:
    idempotency: { strategy: none }
    confirmation: { required: true, risk: medium, reason: "Non-idempotent create; retrying after a failure may duplicate it." }
    retries: { enabled: false }
    state: approved
